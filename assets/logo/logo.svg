<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="ionet">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E09900"/>
      <stop offset="100%" stop-color="#FFB833"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F0FF"/>
      <stop offset="100%" stop-color="#C9B8E8"/>
    </linearGradient>
  </defs>

  <!-- Globe / network node mark -->
  <g transform="translate(40 40)">
    <!-- outer ring -->
    <circle r="28" fill="none" stroke="url(#ringGrad)" stroke-width="2.5"/>
    <!-- meridians -->
    <ellipse cx="0" cy="0" rx="10" ry="28" fill="none" stroke="#E09900" stroke-width="1.5" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="20" ry="28" fill="none" stroke="#E09900" stroke-width="1" opacity="0.55"/>
    <!-- equator -->
    <line x1="-28" y1="0" x2="28" y2="0" stroke="#E09900" stroke-width="1.5" opacity="0.85"/>
    <!-- nodes -->
    <circle cx="0" cy="-28" r="3" fill="#FFB833"/>
    <circle cx="0" cy="28" r="3" fill="#FFB833"/>
    <circle cx="-28" cy="0" r="2.5" fill="#FFB833"/>
    <circle cx="28" cy="0" r="2.5" fill="#FFB833"/>
    <circle cx="0" cy="0" r="3.5" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark "ionet" -->
  <g transform="translate(88 56)" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="42" letter-spacing="-1">
    <text fill="url(#textGrad)">ionet</text>
  </g>
</svg>
